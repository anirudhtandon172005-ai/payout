<style>
        body {
            background-color: #e9e3d5;
            color: #1a1a1a;
            font-family: 'Montserrat', sans-serif;
        }
        
        /* Custom Checkbox/Radio Styles */
        .custom-radio {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #747878;
            border-radius: 50%;
            outline: none;
            cursor: pointer;
            position: relative;
        }
        .custom-radio:checked {
            border-color: #1a1a1a;
        }
        .custom-radio:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background-color: #1a1a1a;
            border-radius: 50%;
        }

        /* Toggle Switch */
        .toggle-switch {
            appearance: none;
            width: 44px;
            height: 24px;
            background-color: #c4c7c7;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            outline: none;
            transition: background-color 0.2s;
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .toggle-switch:checked {
            background-color: #1a1a1a;
        }
        .toggle-switch:checked::after {
            transform: translateX(20px);
        }

        /* Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #1a1a1a;
            cursor: pointer;
            margin-top: -8px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #747878;
            border-radius: 2px;
        }
        
        .transition-height {
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            overflow: hidden;
        }
    </style>

<script>
        function toggleScope(scope) {
            const localDetails = document.getElementById('local-details');
            const nationalDetails = document.getElementById('national-details');
            
            if (scope === 'local') {
                localDetails.style.maxHeight = '500px';
                localDetails.style.opacity = '1';
                localDetails.style.pointerEvents = 'auto';
                
                nationalDetails.style.maxHeight = '0';
                nationalDetails.style.opacity = '0';
                nationalDetails.style.pointerEvents = 'none';
            } else {
                localDetails.style.maxHeight = '0';
                localDetails.style.opacity = '0';
                localDetails.style.pointerEvents = 'none';
                
                nationalDetails.style.maxHeight = '500px';
                nationalDetails.style.opacity = '1';
                nationalDetails.style.pointerEvents = 'auto';
            }
        }

        let isExtended = false;
        const rates = { morning: 5, afternoon: 4, evening: 8, night: 3 };
        
        function toggleExtend() {
            isExtended = document.getElementById('extend-toggle').checked;
            const checkboxes = document.querySelectorAll('input[name="time"]');
            
            // If not extended, enforce single selection behavior
            if (!isExtended) {
                let checkedCount = 0;
                let lastChecked = null;
                checkboxes.forEach(cb => {
                    if (cb.checked) {
                        checkedCount++;
                        lastChecked = cb;
                    }
                });
                
                if (checkedCount > 1) {
                    checkboxes.forEach(cb => {
                        if (cb !== lastChecked) cb.checked = false;
                    });
                }
            }
            
            document.getElementById('summary-line').classList.toggle('hidden', !isExtended);
            updateTimeSelection();
        }

        function updateTimeSelection() {
            const checkboxes = document.querySelectorAll('input[name="time"]');
            
            // Enforce single select if extend is off
            if (!isExtended) {
                checkboxes.forEach(cb => {
                    cb.addEventListener('click', function(e) {
                        if (!isExtended) {
                            checkboxes.forEach(otherCb => {
                                if (otherCb !== this) otherCb.checked = false;
                            });
                        }
                    }, { once: true }); // Prevent adding multiple listeners
                });
            }

            if (isExtended) {
                let selectedNames = [];
                let totalRate = 0;
                
                checkboxes.forEach(cb => {
                    if (cb.checked) {
                        selectedNames.push(cb.value.charAt(0).toUpperCase() + cb.value.slice(1));
                        totalRate += rates[cb.value];
                    }
                });
                
                if (selectedNames.length > 0) {
                    const blended = (totalRate / selectedNames.length).toFixed(2);
                    document.getElementById('selected-blocks-text').innerText = selectedNames.join(' + ');
                    document.getElementById('blended-rate').innerText = '₹' + blended;
                } else {
                    document.getElementById('selected-blocks-text').innerText = 'None';
                    document.getElementById('blended-rate').innerText = '₹0.00';
                }
            }
        }
        
        // Initial setup for time blocks
        document.querySelectorAll('input[name="time"]').forEach(cb => {
            cb.addEventListener('change', function() {
                if (!isExtended && this.checked) {
                    document.querySelectorAll('input[name="time"]').forEach(other => {
                        if (other !== this) other.checked = false;
                    });
                }
                if(isExtended) updateTimeSelection();
            });
        });
    </script>

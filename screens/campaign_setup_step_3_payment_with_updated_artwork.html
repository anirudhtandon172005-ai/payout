<script>
        document.getElementById('pay-btn').addEventListener('click', function(e) {
            e.preventDefault();
            const btn = this;
            
            // Simulate loading
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span>';
            btn.classList.add('opacity-80', 'pointer-events-none');
            
            setTimeout(() => {
                // Transition to success state
                const content = document.getElementById('checkout-content');
                const success = document.getElementById('success-visual');
                const main = document.getElementById('checkout-view');
                
                content.style.opacity = '0';
                
                setTimeout(() => {
                    content.classList.add('hidden');
                    success.classList.remove('hidden', 'opacity-0');
                    success.classList.add('opacity-100', 'flex-col');
                    success.classList.remove('border-l', 'pl-margin-desktop'); // Remove border for full focus
                    main.classList.remove('lg:flex-row'); // Center everything
                    main.classList.add('items-center', 'justify-center', 'min-h-[60vh]');
                }, 300);

            }, 1500);
        });
    </script>
